<title>Earbrief</title>
<style>
  /* --h is the accent hue: set on :root for the selected front, and per-card /
     per-tab for each front's own color. Hue-derived colors (--accent & co.)
     are declared on :root, .ep AND .ftab below — a custom property is
     substituted where it is DECLARED, so a plain :root declaration would
     ignore a card-level --h override. The theme blocks only set the
     hue-independent knobs (--acc-s/l, --acc-ink-s/l) plus the page palette. */
  :root {
    --h: 28;
    --acc-s: 72%; --acc-l: 38%;
    --acc-ink-s: 0%; --acc-ink-l: 100%;
    --ground: hsl(var(--h) 22% 96%);
    --ground-2: hsl(var(--h) 30% 92%);
    --surface: #ffffff;
    --surface-2: hsl(var(--h) 16% 93%);
    --glass: hsla(0, 0%, 100%, 0.82);
    --ink: hsl(var(--h) 18% 14%);
    --muted: hsl(var(--h) 10% 44%);
    --line: hsl(var(--h) 14% 86%);
    --done: hsl(140 42% 38%);
    --shadow: 0 1px 2px hsl(var(--h) 30% 20% / 0.06), 0 8px 24px -12px hsl(var(--h) 30% 20% / 0.25);
    --shadow-dock: 0 2px 6px hsl(var(--h) 30% 15% / 0.10), 0 16px 40px -12px hsl(var(--h) 30% 15% / 0.35);
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --acc-s: 88%; --acc-l: 64%;
      --acc-ink-s: 60%; --acc-ink-l: 8%;
      --ground: hsl(var(--h) 16% 9%);
      --ground-2: hsl(var(--h) 20% 12%);
      --surface: hsl(var(--h) 14% 13%);
      --surface-2: hsl(var(--h) 12% 18%);
      --glass: hsl(var(--h) 14% 13% / 0.82);
      --ink: hsl(var(--h) 20% 92%);
      --muted: hsl(var(--h) 8% 62%);
      --line: hsl(var(--h) 10% 24%);
      --done: hsl(140 45% 60%);
      --shadow: 0 1px 2px hsl(0 0% 0% / 0.3), 0 8px 24px -12px hsl(0 0% 0% / 0.5);
      --shadow-dock: 0 2px 6px hsl(0 0% 0% / 0.35), 0 16px 40px -12px hsl(0 0% 0% / 0.6);
    }
  }
  :root[data-theme="light"] {
    --acc-s: 72%; --acc-l: 38%; --acc-ink-s: 0%; --acc-ink-l: 100%;
    --ground: hsl(var(--h) 22% 96%); --ground-2: hsl(var(--h) 30% 92%);
    --surface: #ffffff; --surface-2: hsl(var(--h) 16% 93%);
    --glass: hsla(0, 0%, 100%, 0.82);
    --ink: hsl(var(--h) 18% 14%); --muted: hsl(var(--h) 10% 44%); --line: hsl(var(--h) 14% 86%);
    --done: hsl(140 42% 38%);
    --shadow: 0 1px 2px hsl(var(--h) 30% 20% / 0.06), 0 8px 24px -12px hsl(var(--h) 30% 20% / 0.25);
    --shadow-dock: 0 2px 6px hsl(var(--h) 30% 15% / 0.10), 0 16px 40px -12px hsl(var(--h) 30% 15% / 0.35);
  }
  :root[data-theme="dark"] {
    --acc-s: 88%; --acc-l: 64%; --acc-ink-s: 60%; --acc-ink-l: 8%;
    --ground: hsl(var(--h) 16% 9%); --ground-2: hsl(var(--h) 20% 12%);
    --surface: hsl(var(--h) 14% 13%); --surface-2: hsl(var(--h) 12% 18%);
    --glass: hsl(var(--h) 14% 13% / 0.82);
    --ink: hsl(var(--h) 20% 92%); --muted: hsl(var(--h) 8% 62%); --line: hsl(var(--h) 10% 24%);
    --done: hsl(140 45% 60%);
    --shadow: 0 1px 2px hsl(0 0% 0% / 0.3), 0 8px 24px -12px hsl(0 0% 0% / 0.5);
    --shadow-dock: 0 2px 6px hsl(0 0% 0% / 0.35), 0 16px 40px -12px hsl(0 0% 0% / 0.6);
  }
  :root, .ep, .ftab {
    --accent: hsl(var(--h) var(--acc-s) var(--acc-l));
    --accent-soft: hsl(var(--h) var(--acc-s) var(--acc-l) / 0.13);
    --accent-ink: hsl(var(--h) var(--acc-ink-s) var(--acc-ink-l));
  }

<div class="wrap">
  <header class="top">
    <div class="brand"><span class="dot"></span>earbrief · <span id="brand-front">on air</span></div>
    <h1 id="headline">Your briefing queue</h1>
    <nav class="fronts" id="fronts" aria-label="Fronts" hidden></nav>
    <div class="stats">
      <span class="pill"><b id="st-pending">0</b> pending</span>
      <span class="pill"><b id="st-min">0</b> min in queue</span>
      <span class="pill"><b id="st-done">0</b> listened</span>
      <button class="pill syncbtn" id="st-sync" hidden></button>
    </div>
    <div class="syncbox" id="syncbox" hidden>
      <textarea id="synctext" rows="2" readonly aria-label="Sync message to copy"></textarea>
      <div class="hint">clipboard is blocked here — long-press the text above to copy it, then paste it to Claude</div>
    </div>
    <details class="settings">
      <summary>voices</summary>
      <div class="vrow"><label for="voice-en">EN</label><select id="voice-en" aria-label="English TTS voice"></select></div>
      <div class="vrow"><label for="voice-es">ES</label><select id="voice-es" aria-label="Spanish TTS voice"></select></div>
    </details>
  </header>

  <section>
    <h2>Up next</h2>
    <div class="list" id="pending"></div>
  </section>

  <section>
    <details id="donewrap">
      <summary style="cursor:pointer"><h2 style="display:inline-block;margin:1rem 0 0.6rem">Listened</h2></summary>

</div>

<div class="transport">
  <div class="inner">
    <div class="title" id="t-title">Nothing playing — pick an episode</div>
    <div class="controls">
      <button class="tbtn" id="t-prev" aria-label="Previous paragraph"><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M3 2h2v12H3zM13 2 6 8l7 6z"/></svg></button>
      <button class="tbtn play" id="t-play" aria-label="Play or pause"><svg id="t-play-ico" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 2.5v11l9-5.5z"/></svg></button>
      <button class="tbtn" id="t-next" aria-label="Next paragraph"><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11 2h2v12h-2zM3 2l7 6-7 6z"/></svg></button>
      <span class="spacer"></span>
      <button class="tbtn txt" id="t-lang" aria-label="Listening language (auto: news in Spanish, deep-dives in English)">AUTO</button>

    </div>
    <div class="tbar"><i id="t-bar"></i></div>
  </div>
</div>

<script>
const FRONTS = /*__FRONTS__*/[]; // [{id, label, hue}] display order; >1 → switcher shows
const EPISODES = /*__EPISODES__*/[];
const LISTENED = /*__LISTENED__*/[]; // ids checked in log.md at build time (repo = source of truth)
const RATINGS = /*__RATINGS__*/{}; // id -> 1..5 star rating from log.md at build time
const WPM = 150;
const LS = "aib-v1";
const ICO_PLAY = '<path d="M4 2.5v11l9-5.5z"/>';
const ICO_PAUSE = '<path d="M3.5 2.5h3v11h-3zM9.5 2.5h3v11h-3z"/>';

// ---------- state ----------
let store = {};
try { store = JSON.parse(localStorage.getItem(LS) || "{}"); } catch (e) { store = {}; }
store.eps = store.eps || {};   // id -> {i: chunkIdx, l: lang the idx refers to, done: bool, r: 1..5 rating}
store.rate = store.rate || 1;
store.lang = store.lang || "auto"; // auto | en | es
store.front = store.front || "all"; // selected front id, or "all"
if (store.front !== "all" && !FRONTS.some(f => f.id === store.front)) store.front = "all";
if (typeof store.voice !== "object" || !store.voice) store.voice = { en: store.voice || "", es: "" };
store.synced = store.synced || []; // repo-listened ids already applied on this device
function save() { localStorage.setItem(LS, JSON.stringify(store)); }
function epState(id) { return store.eps[id] || (store.eps[id] = { i: 0, l: "en", done: false }); }

// seed listened-state from the repo, once per id per device — after that the
// local checkbox is free to disagree (e.g. unchecked for a replay)
LISTENED.forEach(id => {
  if (store.synced.indexOf(id) !== -1) return;
  epState(id).done = true;
  store.synced.push(id);
});
// same seeding contract for ratings: apply each repo rating once, then the
// local stars are free to disagree until the next sync round-trip
store.syncedr = store.syncedr || {}; // id -> repo rating already applied on this device
Object.keys(RATINGS).forEach(id => {
  if (store.syncedr[id] === RATINGS[id]) return;
  epState(id).r = RATINGS[id];
  store.syncedr[id] = RATINGS[id];
});
save();
// local plays the repo doesn't know about yet → offered by the sync button
function unsynced() {
  return EPISODES.filter(e => epState(e.id).done && LISTENED.indexOf(e.id) === -1).map(e => e.id);
}
// local ratings the repo doesn't know about yet, as "id=n" pairs
function unsyncedRatings() {
  return EPISODES.filter(e => epState(e.id).r && epState(e.id).r !== RATINGS[e.id])
    .map(e => e.id + "=" + epState(e.id).r);
}

// ---------- fronts ----------
function frontOf(ep) { return FRONTS.find(f => f.id === ep.front) || { id: ep.front, label: ep.front, hue: 28 }; }
function inView(ep) { return store.front === "all" || ep.front === store.front; }
function viewEpisodes() { return EPISODES.filter(inView); }
function applyFrontTheme() {
  const f = FRONTS.find(x => x.id === store.front);
  document.documentElement.style.setProperty("--h", f ? f.hue : 28);
}

// ---------- chunking (sentence groups <=190 chars, tagged with paragraph idx) ----------
function chunk(text) {
  const out = [];
  text.split(/\n\s*\n/).forEach((para, p) => {
    const clean = para.replace(/\s+/g, " ").trim();
    if (!clean) return;
    const sentences = clean.match(/[^.!?]+[.!?]+["')\]]*\s*|.+$/g) || [clean];
    let buf = "";
    sentences.forEach(s => {
      if (buf && (buf + s).length > 190) { out.push({ t: buf.trim(), p }); buf = ""; }
      buf += s;
    });
    if (buf.trim()) out.push({ t: buf.trim(), p });
  });
  return out;
}
const CHUNKS = {};
EPISODES.forEach(e => {
  CHUNKS[e.id] = { en: chunk(e.text), es: e.text_es ? chunk(e.text_es) : null };
});

// ---------- language ----------
// precedence: per-episode pin (st.o) > global mode > auto (news→es, deepdive→en)
function langFor(ep) {
  if (!ep.text_es) return "en";
  const o = epState(ep.id).o;
  if (o) return o;
  if (store.lang === "auto") return ep.type === "news" ? "es" : "en";
  return store.lang;
}
function chunksFor(ep) { return CHUNKS[ep.id][langFor(ep)] || CHUNKS[ep.id].en; }
function titleFor(ep) { return langFor(ep) === "es" && ep.title_es ? ep.title_es : ep.title; }
function textFor(ep) { return langFor(ep) === "es" && ep.text_es ? ep.text_es : ep.text; }
// keep listening position when the language changes: map by paragraph index
function syncLang(ep) {
  const st = epState(ep.id);
  const lang = langFor(ep);
  if (st.l === lang) return st;
  const from = CHUNKS[ep.id][st.l] || CHUNKS[ep.id].en;
  const to = chunksFor(ep);
  if (st.done || st.i >= from.length) { st.i = st.done ? to.length : Math.min(st.i, to.length); st.l = lang; return st; }
  const para = (from[st.i] || { p: 0 }).p;
  const idx = to.findIndex(c => c.p === para);
  st.i = idx < 0 ? Math.min(st.i, to.length - 1) : idx;
  st.l = lang;
  return st;
}

// ---------- speech ----------
const synth = window.speechSynthesis;
let cur = null;        // current episode id
let playing = false;
let gen = 0;           // generation guard: cancel() fires onend in some engines
let wakeLock = null;

function epById(id) { return EPISODES.find(e => e.id === id); }
function voices(lang) {
  return synth.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith(lang));
}
function pickVoice(lang) {
  const vs = voices(lang);
  return vs.find(v => v.name === store.voice[lang]) || vs.find(v => v.default) || vs[0] || null;
}
function speakChunk() {
  const ep = epById(cur);
  const st = syncLang(ep);
  const chunks = chunksFor(ep);
  if (st.i >= chunks.length) { finishEpisode(); return; }
  const lang = langFor(ep);
  const u = new SpeechSynthesisUtterance(chunks[st.i].t);
  const v = pickVoice(lang);
  if (v) u.voice = v;
  u.lang = lang === "es" ? "es-419" : "en-US";
  u.rate = store.rate;
  const myGen = gen;
  u.onend = () => {
    if (myGen !== gen || !playing) return;
    st.i++; save(); render();
    speakChunk();
  };
  u.onerror = u.onend;
  synth.speak(u);
}
async function play(id) {
  if (cur !== id) { stopSpeech(); cur = id; }
  const st = epState(id);
  if (st.done) { st.done = false; st.i = 0; } // replay
  playing = true;
  gen++;
  synth.cancel();
  speakChunk();
  try { wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
  render();
}
function stopSpeech() {
  gen++;
  playing = false;
  synth.cancel();
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
function pause() { stopSpeech(); render(); }
function finishEpisode() {
  const ep = epById(cur);
  const st = epState(cur);
  st.done = true; st.i = chunksFor(ep).length;
  stopSpeech(); save(); render();
}
function seekPara(dir) {
  if (!cur) return;
  const ep = epById(cur);
  const st = syncLang(ep);
  const chunks = chunksFor(ep);
  const p = (chunks[Math.min(st.i, chunks.length - 1)] || { p: 0 }).p + dir;
  const idx = chunks.findIndex(c => c.p === Math.max(0, p));
  st.i = idx < 0 ? (dir > 0 ? chunks.length : 0) : idx;
  save();
  if (playing) { gen++; synth.cancel(); speakChunk(); }
  render();
}

// ---------- spark hook (UC5): fire an external Claude session ----------
function sparkURL(ep) {
  const firstPara = ep.text.split(/\n\s*\n/)[0].slice(0, 400);
  const q = `While listening to my earbrief episode "${ep.title}" (${ep.date}, ${ep.type}, front: ${frontOf(ep).label}), an idea sparked. The episode opens with: "${firstPara}". Ask me what the idea is, then help me deep-dive it. This session is independent of the briefing pipeline.`;
  return "https://claude.ai/new?q=" + encodeURIComponent(q);
}

// ---------- render ----------
const $ = id => document.getElementById(id);
function mins(ep) {
  const w = langFor(ep) === "es" && ep.text_es ? Math.round(ep.words * 1.05) : ep.words;
  return Math.max(1, Math.round(w / WPM));
}
function pct(ep) {
  const st = syncLang(ep);
  if (st.done) return 100;
  const n = chunksFor(ep).length || 1;
  return Math.round(100 * Math.min(st.i, n) / n);
}
function card(ep) {
  const st = syncLang(ep);
  const el = document.createElement("article");
  el.className = "ep" + (st.done ? " done" : "") + (cur === ep.id ? " current" : "");
  el.style.setProperty("--h", frontOf(ep).hue); // card wears its front's color
  const chipCls = ep.type === "deepdive" ? "chip deepdive" : "chip";
  const chipTxt = ep.type === "deepdive" ? "deep dive" : "news";
  el.innerHTML =
    '<div class="meta"><span class="' + chipCls + '">' + chipTxt + "</span>" +
    (store.front === "all" && FRONTS.length > 1 ? '<span class="chip frontname"></span>' : "") +
    '<button class="langchip' + (st.o ? " pinned" : "") + '" data-act="lang" title="Tap to pin the language for this episode">' + langFor(ep) + (st.o ? " ✱" : "") + "</button>" +
    "<span>" + ep.date + "</span><span>~" + mins(ep) + " min</span>" +
    (st.done ? '<span style="color:var(--done)">✓ listened</span>' : "") + "</div>" +
    "<h3></h3>" +
    '<div class="bar"><i style="width:' + pct(ep) + '%"></i></div>' +
    '<div class="row">' +
    '<button class="btn primary" data-act="play"><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">' +
    (playing && cur === ep.id ? ICO_PAUSE : ICO_PLAY) + "</svg>" +
    (playing && cur === ep.id ? "Pause" : (st.i > 0 && !st.done ? "Resume" : (st.done ? "Replay" : "Play"))) + "</button>" +
    '<a class="btn" href="' + sparkURL(ep) + '" target="_blank" rel="noopener">✦ Spark</a>' +
    '<span class="spacer"></span>' +
    '<label class="donechk"><input type="checkbox" data-act="done"' + (st.done ? " checked" : "") + "> done</label>" +
    "</div>" +
    (st.done || st.r
      ? '<div class="raterow" role="group" aria-label="Rate this episode">' +
        [1, 2, 3, 4, 5].map(n =>
          '<button class="star' + ((st.r || 0) >= n ? " on" : "") + '" data-star="' + n +
          '" aria-label="' + n + ' of 5 stars">' + ((st.r || 0) >= n ? "★" : "☆") + "</button>").join("") +
        (st.r ? "" : '<span class="ratehint">rate it → steers future episodes</span>') +
        "</div>"
      : "") +
    '<details class="txt"><summary>transcript</summary><div class="transcript"></div></details>' +
    ((ep.sources || []).length ? '<details class="txt srcs"><summary>sources (' + ep.sources.length + ")</summary><ul class=\"sourcelist\"></ul></details>" : "");
  el.querySelector("h3").textContent = titleFor(ep);
  const fn = el.querySelector(".frontname");
  if (fn) fn.textContent = frontOf(ep).label;
  const sl = el.querySelector(".sourcelist");
  if (sl) ep.sources.forEach(s => {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = s.url;
    a.target = "_blank";
    a.rel = "noopener";
    a.textContent = s.name;
    li.appendChild(a);
    sl.appendChild(li);
  });
  const tr = el.querySelector(".transcript");
  const chunks = chunksFor(ep);
  const curPara = (chunks[Math.min(st.i, chunks.length - 1)] || {}).p;
  textFor(ep).split(/\n\s*\n/).forEach((para, p) => {
    if (!para.trim()) return;
    const pe = document.createElement("p");
    pe.textContent = para.trim();
    if (cur === ep.id && p === curPara && !st.done) pe.className = "now";
    tr.appendChild(pe);
  });
  el.querySelector('[data-act="lang"]').onclick = () => {
    if (!ep.text_es) return; // English-only episode, nothing to pin
    const s = epState(ep.id);
    // tap: pin the other language; tap again: back to following the default
    s.o = s.o ? undefined : (langFor(ep) === "en" ? "es" : "en");
    save();
    if (playing && cur === ep.id) { syncLang(ep); gen++; synth.cancel(); speakChunk(); }
    render();
  };
  el.querySelector('[data-act="play"]').onclick = () =>
    (playing && cur === ep.id) ? pause() : play(ep.id);
  el.querySelectorAll("[data-star]").forEach(b => b.onclick = () => {
    const s = epState(ep.id);
    const n = +b.dataset.star;
    s.r = s.r === n ? undefined : n; // tap the current rating again to clear it
    save(); render();
  });
  el.querySelector('[data-act="done"]').onchange = ev => {
    const s = epState(ep.id);
    s.done = ev.target.checked;
    s.i = s.done ? chunksFor(ep).length : 0;
    if (s.done && cur === ep.id) stopSpeech();
    save(); render();
  };
  return el;
}
function renderFronts() {
  const nav = $("fronts");
  nav.hidden = FRONTS.length < 2;
  if (nav.hidden) return;
  nav.innerHTML = "";
  const pendIn = fid => EPISODES.filter(e => (fid === "all" || e.front === fid) && !epState(e.id).done).length;
  [{ id: "all", label: "All", hue: 28 }].concat(FRONTS).forEach(f => {
    const b = document.createElement("button");
    b.className = "ftab";
    b.style.setProperty("--fh", f.hue);
    b.setAttribute("aria-pressed", store.front === f.id);
    const n = pendIn(f.id);
    b.innerHTML = '<span class="fdot"></span><span class="lbl"></span>' + (n ? '<span class="n">' + n + "</span>" : "");
    b.querySelector(".lbl").textContent = f.label;
    b.onclick = () => {
      store.front = f.id;
      save();
      applyFrontTheme();
      render();
    };
    nav.appendChild(b);
  });
}
function render() {
  renderFronts();
  const curFront = FRONTS.find(f => f.id === store.front);
  $("brand-front").textContent = curFront ? curFront.label.toLowerCase() : "all fronts";
  $("headline").textContent = curFront ? curFront.label : "Your briefing queue";
  const pend = $("pending"), done = $("donelist");
  pend.innerHTML = ""; done.innerHTML = "";
  let nPend = 0, nDone = 0, minPend = 0;
  viewEpisodes().forEach(ep => {
    const c = card(ep);
    if (epState(ep.id).done) { done.appendChild(c); nDone++; }
    else { pend.appendChild(c); nPend++; minPend += mins(ep); }
  });
  if (!nPend) pend.innerHTML = '<div class="empty">Queue clear' + (curFront ? " on this front" : "") + ". Next episode lands with the morning routine.</div>";
  $("st-pending").textContent = nPend;
  $("st-done").textContent = nDone;
  $("st-min").textContent = minPend;
  const nSync = unsynced().length + unsyncedRatings().length;
  $("st-sync").hidden = !nSync;
  if (nSync) $("st-sync").textContent = "sync " + nSync + " to log ⇪";
  // transport
  const ep = epById(cur);
  $("t-play-ico").innerHTML = playing ? ICO_PAUSE : ICO_PLAY;
  $("t-rate").textContent = store.rate + "×";
  $("t-lang").textContent = store.lang === "auto" ? "AUTO" : store.lang.toUpperCase();
  if (ep) {
    $("t-title").innerHTML = "<b></b>";
    $("t-title").querySelector("b").textContent = titleFor(ep);
    $("t-bar").style.width = pct(ep) + "%";
  } else {
    $("t-title").textContent = "Nothing playing — pick an episode";
    $("t-bar").style.width = "0";
  }
}

// ---------- wire up ----------
$("t-play").onclick = () => {
  if (!cur) { const first = viewEpisodes().find(e => !epState(e.id).done); if (first) play(first.id); return; }
  playing ? pause() : play(cur);
};
// sandboxed hosts (the artifact viewer iframe) reject the async clipboard API
// and swallow window.prompt without showing anything, so fall back in layers:
// clipboard → execCommand copy → inline selectable text.
function execCopy(t) {
  const ta = document.createElement("textarea");
  ta.value = t;
  ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;font-size:16px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  ta.setSelectionRange(0, t.length);
  let ok = false;
  try { ok = document.execCommand("copy"); } catch (e) {}
  ta.remove();
  return ok;
}
$("st-sync").onclick = async () => {
  const us = unsynced(), ur = unsyncedRatings();
  const parts = [];
  if (us.length) parts.push("mark listened: " + us.join(", "));
  if (ur.length) parts.push("rate: " + ur.join(", "));
  if (!parts.length) return;
  const msg = parts.join("; ");
  let ok = false;
  try { await navigator.clipboard.writeText(msg); ok = true; } catch (e) {}
  if (!ok) ok = execCopy(msg);
  if (ok) {
    $("syncbox").hidden = true;
    $("st-sync").textContent = "copied ✓ — paste to Claude";
  } else {
    const ta = $("synctext");
    ta.value = msg;
    $("syncbox").hidden = false;
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, msg.length);
    $("st-sync").textContent = "copy it below ↓";
  }
};
$("t-prev").onclick = () => seekPara(-1);
$("t-next").onclick = () => seekPara(1);
$("t-lang").onclick = () => {
  const modes = ["auto", "en", "es"];
  store.lang = modes[(modes.indexOf(store.lang) + 1) % modes.length];
  save();
  if (playing && cur) { gen++; synth.cancel(); speakChunk(); }
  render();
};
$("t-rate").onclick = () => {
  const rates = [1, 1.25, 1.5, 1.75];
  store.rate = rates[(rates.indexOf(store.rate) + 1) % rates.length];
  save();
  if (playing) { gen++; synth.cancel(); speakChunk(); }
  render();
};
function fillVoices() {
  ["en", "es"].forEach(lang => {
    const sel = $("voice-" + lang);
    sel.innerHTML = "";
    const vs = voices(lang);
    if (!vs.length) {
      const o = document.createElement("option");
      o.textContent = "no " + lang.toUpperCase() + " voices installed";
      o.disabled = true;
      sel.appendChild(o);
      return;
    }
    vs.forEach(v => {
      const o = document.createElement("option");
      o.value = v.name;
      o.textContent = v.name + " (" + v.lang + ")";
      if (v.name === store.voice[lang]) o.selected = true;
      sel.appendChild(o);
    });
  });
}
["en", "es"].forEach(lang => {
  $("voice-" + lang).onchange = ev => {
    store.voice[lang] = ev.target.value; save();
    if (playing && cur && langFor(epById(cur)) === lang) { gen++; synth.cancel(); speakChunk(); }
  };
});
if (synth) {
  fillVoices();
  synth.onvoiceschanged = fillVoices;
}
document.addEventListener("visibilitychange", async () => {
  if (!document.hidden && playing && !wakeLock) {
    try { wakeLock = await navigator.wakeLock.request("screen"); } catch (e) {}
  }
});
applyFrontTheme();
render();
</script>
